name: Refresh UFO data

# Pulls the latest reports from nuforc.org, merges them into the committed
# snapshot and commits the result — but only when new reports actually arrive.
# Runs on a GitHub-hosted runner, which (unlike sandboxed dev environments) has
# open internet egress and can reach nuforc.org directly.

on:
  schedule:
    - cron: '17 6 * * *' # daily, 06:17 UTC
  workflow_dispatch:
    inputs:
      since_days:
        description: 'How many days of NUFORC history to pull (use a large value for a one-time backfill)'
        required: false
        default: '120'
      max_pages:
        description: 'Max NUFORC index periods to crawl'
        required: false
        default: '8'

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild dataset from live NUFORC
        env:
          NUFORC_SINCE_DAYS: ${{ github.event.inputs.since_days || '120' }}
          NUFORC_MAX_PAGES: ${{ github.event.inputs.max_pages || '8' }}
        run: npm run build:data

      - name: Commit if new reports landed
        run: |
          set -euo pipefail
          # sightings.json has no timestamp, so it only changes when records do.
          if git diff --quiet -- src/data/sightings.json; then
            echo "No new reports — nothing to commit."
            exit 0
          fi
          git config user.name  "ufo-data-bot"
          git config user.email "actions@github.com"
          git add src/data/sightings.json src/data/stats.json
          total=$(node -e "console.log(require('./src/data/stats.json').total)")
          live=$(node -e "console.log(require('./src/data/stats.json').liveReports||0)")
          git commit -m "chore(data): refresh NUFORC snapshot (${total} reports, ${live} live) [skip ci]"
          git push
