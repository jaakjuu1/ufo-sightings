name: Branch Deploy

on:
  push:
    branches-ignore:
      - gh-pages
      - dependabot/**

permissions:
  contents: read
  packages: write

jobs:
  sanitize:
    name: Sanitize branch tag
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.safe.outputs.branch }}
    steps:
      - name: Sanitize branch name
        id: safe
        shell: bash
        run: |
          set -euo pipefail
          safe=$(printf '%s' '${{ github.ref_name }}' | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9_.-')
          safe=${safe:0:80}
          echo "branch=$safe" >> "$GITHUB_OUTPUT"

  build:
    name: Build app image
    runs-on: ubuntu-latest
    needs: sanitize
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:branch-${{ needs.sanitize.outputs.branch }}-sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
