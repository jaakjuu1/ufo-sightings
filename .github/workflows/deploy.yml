name: Build GHCR Images

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to tag, when manually backfilling
        required: false
      sha:
        description: Full 40-character commit SHA to tag, when manually backfilling
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build app image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pr="${{ github.event.pull_request.number }}"
            sha="${{ github.event.pull_request.head.sha }}"
          else
            pr="${{ github.event.inputs.pr_number }}"
            sha="${{ github.event.inputs.sha || github.sha }}"
          fi
          if [ -z "$pr" ] || [ -z "$sha" ]; then
            echo "manual dispatch needs pr_number and sha" >&2
            exit 64
          fi
          echo "tag=pr-${pr}-sha-${sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
